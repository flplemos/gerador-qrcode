<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de QR Code Permanente</title>
    <link rel="shortcut icon" href="img/favicon.svg" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <img src="img/Senac-Labs-Edutech-BRANCA-scaled-1.png.webp" alt="Logo EduTech (modo escuro)" class="logo logo-dark">
    <img src="img/SenacLabs EduTech Colorida.jpg" alt="Logo EduTech Colorida (modo claro)" class="logo logo-light">
    <div class="theme-toggle">
        
        <button id="theme-btn" class="theme-toggle-btn" title="Alternar modo claro/escuro">🌙</button>
    </div>
    <div class="container">
        <h1>Gerador de QR Code</h1>
        <p>Insira um link ou texto para gerar seu código estático.</p>

        <div class="input-group">
            <input type="text" id="qr-input" placeholder="Ex: https://seusite.com.br">
            <button id="generate-btn">Gerar</button>
        </div>
        
        <div class="options-grid">
            <div class="option-item">
                <label for="qr-size">Tamanho:</label>
                <select id="qr-size">
                    <option value="128">128x128</option>
                    <option value="256" selected>256x256</option>
                    <option value="512">512x512</option>
                    <option value="1024">1024x1024</option>
                </select>
            </div>
            <div class="option-item">
                <label for="qr-color-dark">Cor do Código:</label>
                <input type="color" id="qr-color-dark" value="#000000">
            </div>
            <div class="option-item">
                <label for="qr-color-light">Cor do Fundo:</label>
                <input type="color" id="qr-color-light" value="#ffffff">
            </div>
            <div class="option-item">
                <label for="qr-correction">Correção de Erro:</label>
                <select id="qr-correction">
                    <option value="L">Baixa (Mais limpo)</option>
                    <option value="M" selected>Média (Padrão)</option>
                    <option value="Q">Alta</option>
                    <option value="H">Máxima (Mais denso)</option>
                </select>
            </div>
        </div>
        
        <div id="result-area" class="hidden">
            <div id="qrcode-container"></div>
            <p id="qrcode-info" style="color: var(--text-secondary); font-size: 0.9rem; margin: 10px 0;">Prévia em escala. Tamanho real: <strong id="qrcode-size-info"></strong></p>
            <div class="action-buttons">
                <button id="download-pure-btn" class="download-btn secondary-btn">Baixar Apenas Código (PNG)</button>
                <button id="download-framed-btn" class="download-btn primary-btn">Baixar com Borda (PNG)</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
